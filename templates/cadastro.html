{% extends 'base.html' %}
{% block title %}FutureShop — Cadastro{% endblock %}



{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <h2>Criar conta</h2>
    <p class="auth-sub">Já tem conta? <a href="{{ url_for('login') }}">Faça login</a></p>

    <form method="POST" action="{{ url_for('cadastro') }}">
      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome" placeholder="Seu nome" required />
      </div>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required />
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" required />
      </div>
      <div class="form-group">
        <label for="confirmar_senha">Confirmar senha</label>
        <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="Repita a senha" required />
      </div>
      <button type="submit" class="btn-primary btn-block">Criar conta</button>
    </form>
  </div>
</section>
{% endblock %}
